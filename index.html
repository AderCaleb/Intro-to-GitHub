    <h1>Intro to Git and Github</h1>
    
    <!-- The steps to use git -->
    <!-- git status | git add . | git status | git commit -m "" | git push -->
     <!-- git status - tells you the status of the folder
      git add . - adds all the files in the folder to git {You can choose to add any file in the folder if you don't want all of them}
      git commit -m "" - commits all the files to git, also adds a message of our choosing
      git push - pushes the files to github -->
